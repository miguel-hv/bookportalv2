server:
  http_listen_port: 9080
  grpc_listen_port: 9081

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: bookportal-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: bookportal
          service: backend
          __path__: /var/log/bookportal/*.log
