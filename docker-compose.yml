version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/.mvn
      - /app/target
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - FRONTEND_URL=http://frontend:5173
    depends_on:
      - postgres
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=bookportal
      - POSTGRES_USER=bookportal
      - POSTGRES_PASSWORD=bookportal
    volumes:
      - ./backend/src/main/resources/db/seed/dev-seed-data.sql:/docker-entrypoint-initdb.d/01-seed-data.sql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge