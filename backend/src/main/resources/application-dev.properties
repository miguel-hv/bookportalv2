#docker dev setup - PostgreSQL

# PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/bookportal
spring.datasource.username=bookportal
spring.datasource.password=bookportal
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# CORS configuration
frontend.url=${FRONTEND_URL:http://frontend:5173}
