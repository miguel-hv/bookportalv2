# Docker production Spring profile - PostgreSQL

# PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/bookportal
spring.datasource.username=${DB_USER:bookportal}
spring.datasource.password=${DB_PASSWORD:bookportal}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# HikariCP connection pooling - using Spring Boot defaults
# Default: max pool size 10, minimum idle 10

# CORS configuration
frontend.url=${FRONTEND_URL:http://frontend}