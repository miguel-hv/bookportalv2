version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://backend:8080/api
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      target: prod
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - FRONTEND_URL=http://frontend
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    depends_on:
      - postgres
    volumes:
      - app-logs:/app/logs
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    env_file:
      - .env.prod
    environment:
      - POSTGRES_DB=bookportal
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  app-logs:
    driver: local

networks:
  app-network:
    driver: bridge