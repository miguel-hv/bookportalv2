version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://backend:8080/api
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      target: prod
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - FRONTEND_URL=http://frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge